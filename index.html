<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luma Passport - Instant Photo Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Luma Passport</h1>
        <input type="file" id="upload" accept="image/*">
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        <button id="downloadBtn">Download Passport Photo</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
