<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <title>Luma Passport Photo Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Luma Passport Photo Maker</h1>
        <input type="file" id="upload" accept="image/*">
        <div class="preview">
            <canvas id="photoCanvas"></canvas>
        </div>
        <button id="downloadBtn">Download Photo</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
